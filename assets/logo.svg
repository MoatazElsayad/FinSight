<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="gradientBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b8cff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7ba3ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle with gradient -->
  <circle cx="60" cy="60" r="60" fill="url(#gradientBlue)" filter="url(#shadow)"/>
  
  <!-- "F" Letter -->
  <text x="60" y="75" font-family="Arial, sans-serif" font-size="72" font-weight="900" 
        fill="#ffffff" text-anchor="middle" dominant-baseline="middle">
    F
  </text>
  
  <!-- Decorative bars behind F -->
  <rect x="25" y="35" width="4" height="50" fill="#ffffff" opacity="0.3" rx="2"/>
  <rect x="91" y="35" width="4" height="50" fill="#ffffff" opacity="0.3" rx="2"/>
</svg>
